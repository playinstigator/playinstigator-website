<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Dev Beats — Tap Recorder</title>
<style>
  :root {
    --bg: #0a0a14;
    --panel: #14142a;
    --text: #e8e8f0;
    --dim: #888;
    --accent: #b388ff;
    --ok: #69f0ae;
    --warn: #ffd54f;
    --danger: #ff4081;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 14px;
    min-height: 100vh;
  }

  h1 { font-size: 22px; letter-spacing: 3px; }
  h2 { font-size: 13px; color: var(--dim); font-weight: normal; letter-spacing: 2px; margin-top: 4px; }

  .page {
    max-width: 960px; margin: 0 auto; padding: 32px 24px;
    display: flex; gap: 24px; align-items: flex-start;
  }
  .main-col { flex: 1; min-width: 0; }

  /* ---- visualizer ---- */
  .viz-col {
    flex: 0 0 140px;
    position: sticky; top: 24px;
  }
  .viz-label {
    font-size: 11px; color: var(--dim); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 8px; text-align: center;
  }
  #viz-canvas {
    display: block;
    width: 140px;
    border-radius: 8px;
    background: var(--panel);
  }

  /* ---- header ---- */
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; }
  .header a { color: var(--dim); font-size: 12px; text-decoration: none; letter-spacing: 1px; }
  .header a:hover { color: var(--text); }
  #btn-lang {
    background: transparent; color: var(--dim);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
    padding: 5px 12px; font-family: inherit; font-size: 12px;
    cursor: pointer; letter-spacing: 1px; margin-left: 16px;
    transition: color 0.15s, border-color 0.15s;
  }
  #btn-lang:hover { color: var(--text); border-color: rgba(255,255,255,0.35); }

  /* ---- file drop ---- */
  .file-drop {
    display: block;
    border: 2px dashed var(--accent);
    border-radius: 8px;
    padding: 22px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 20px;
  }
  .file-drop:hover, .file-drop.drag { background: rgba(179,136,255,0.08); border-color: var(--text); }
  .file-drop input { display: none; }
  .file-drop .label { color: var(--accent); font-weight: bold; letter-spacing: 2px; }
  .file-drop .sub { color: var(--dim); font-size: 12px; margin-top: 6px; }
  #file-status { color: var(--ok); font-size: 12px; letter-spacing: 1px; min-height: 18px; margin-bottom: 16px; }

  /* ---- transport ---- */
  .transport {
    display: flex; align-items: center; gap: 12px;
    background: var(--panel); border-radius: 8px;
    padding: 14px 18px; margin-bottom: 20px;
  }
  .transport button {
    background: var(--accent); color: var(--bg);
    border: none; padding: 8px 20px;
    font-family: inherit; font-size: 13px; font-weight: bold;
    letter-spacing: 2px; cursor: pointer; border-radius: 4px;
    transition: transform 0.1s;
  }
  .transport button:hover { transform: scale(1.04); }
  .transport button:disabled { opacity: 0.35; cursor: default; transform: none; }
  .transport button.secondary {
    background: transparent; color: var(--dim);
    border: 1px solid var(--dim);
  }
  .transport button.secondary:hover { color: var(--text); border-color: var(--text); }
  #time-display {
    font-size: 20px; letter-spacing: 2px; min-width: 80px;
    color: var(--text);
  }
  .speed-group { display: flex; align-items: center; gap: 6px; }
  .speed-group .lbl { font-size: 11px; color: var(--dim); letter-spacing: 2px; }
  #speed-input {
    background: var(--bg); color: var(--text);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
    padding: 5px 8px; font-family: inherit; font-size: 12px;
    letter-spacing: 1px; width: 64px; text-align: center;
  }
  #speed-input:focus { outline: 1px solid var(--accent); }
  #speed-input::-webkit-outer-spin-button,
  #speed-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  #speed-input { -moz-appearance: textfield; }
  .speed-group .suffix { color: var(--dim); font-size: 12px; margin-left: -2px; }
  #tap-hint {
    flex: 1; text-align: right; color: var(--dim); font-size: 12px; letter-spacing: 1px;
  }

  /* ---- tap flash ---- */
  #tap-flash {
    position: fixed; inset: 0; pointer-events: none;
    background: rgba(179,136,255,0.12);
    opacity: 0; transition: opacity 0.08s;
    z-index: 999;
  }
  #tap-flash.on { opacity: 1; transition: none; }

  /* ---- tap list ---- */
  .section-label {
    font-size: 11px; color: var(--dim); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  #tap-list-wrap {
    background: var(--panel); border-radius: 8px;
    max-height: 320px; overflow-y: auto;
    margin-bottom: 16px;
  }
  #tap-list {
    width: 100%; border-collapse: collapse;
  }
  #tap-list th {
    position: sticky; top: 0;
    background: var(--panel); color: var(--dim);
    font-size: 11px; letter-spacing: 1px;
    text-align: left; padding: 10px 14px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  #tap-list td {
    padding: 6px 14px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  #tap-list tr:last-child td { border-bottom: none; }
  #tap-list tr.latest td { color: var(--ok); }
  .tap-del {
    background: none; border: none; color: var(--danger);
    cursor: pointer; font-size: 13px; padding: 0 4px;
    font-family: inherit;
  }
  .tap-del:hover { color: var(--text); }
  .tsec-input {
    background: none; border: none; border-bottom: 1px solid transparent;
    color: inherit; font-family: inherit; font-size: 13px;
    width: 80px; padding: 1px 2px;
    transition: border-color 0.15s;
  }
  .tsec-input:focus {
    outline: none; border-bottom-color: var(--accent);
    color: var(--text);
  }
  .tsec-input:hover { border-bottom-color: var(--dim); }

  /* ---- layer selector ---- */
  .layer-selector {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .layer-selector .lbl {
    font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-right: 4px;
  }
  .layer-btn {
    background: transparent;
    border: 2px solid transparent;
    border-radius: 4px;
    padding: 5px 14px;
    font-family: inherit; font-size: 12px; font-weight: bold;
    letter-spacing: 2px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    opacity: 0.45;
  }
  .layer-btn.active { opacity: 1; }
  .layer-show-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 3px 10px;
    font-family: inherit; font-size: 11px; font-weight: bold;
    letter-spacing: 2px; cursor: pointer;
    transition: opacity 0.15s, background 0.15s, border-color 0.15s;
    opacity: 0.35;
  }
  .layer-show-btn.on { opacity: 1; }
  .layer-show-btn[data-layer="1"] { color: #00e5ff; border-color: #00e5ff; }
  .layer-show-btn[data-layer="2"] { color: #ffd54f; border-color: #ffd54f; }
  .layer-show-btn[data-layer="3"] { color: #ff4081; border-color: #ff4081; }
  .layer-show-btn[data-layer="4"] { color: #69f0ae; border-color: #69f0ae; }
  .layer-show-btn[data-layer="5"] { color: #b388ff; border-color: #b388ff; }
  .layer-show-btn[data-layer="1"].on { background: rgba(0,229,255,0.12); }
  .layer-show-btn[data-layer="2"].on { background: rgba(255,213,79,0.12); }
  .layer-show-btn[data-layer="3"].on { background: rgba(255,64,129,0.12); }
  .layer-show-btn[data-layer="4"].on { background: rgba(105,240,174,0.12); }
  .layer-show-btn[data-layer="5"].on { background: rgba(179,136,255,0.12); }
  .layer-btn[data-layer="1"] { color: #00e5ff; border-color: #00e5ff; }
  .layer-btn[data-layer="2"] { color: #ffd54f; border-color: #ffd54f; }
  .layer-btn[data-layer="3"] { color: #ff4081; border-color: #ff4081; }
  .layer-btn[data-layer="4"] { color: #69f0ae; border-color: #69f0ae; }
  .layer-btn[data-layer="5"] { color: #b388ff; border-color: #b388ff; }
  .layer-btn[data-layer="1"].active { background: rgba(0,229,255,0.12); }
  .layer-btn[data-layer="2"].active { background: rgba(255,213,79,0.12); }
  .layer-btn[data-layer="3"].active { background: rgba(255,64,129,0.12); }
  .layer-btn[data-layer="4"].active { background: rgba(105,240,174,0.12); }
  .layer-btn[data-layer="5"].active { background: rgba(179,136,255,0.12); }
  .layer-badge {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; margin-right: 4px; vertical-align: middle;
    cursor: pointer;
  }
  #empty-msg { padding: 24px 14px; color: var(--dim); font-size: 12px; letter-spacing: 1px; }

  /* ---- actions ---- */
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
  .actions button {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent);
    padding: 9px 20px; font-family: inherit; font-size: 12px;
    font-weight: bold; letter-spacing: 2px; cursor: pointer;
    border-radius: 4px; transition: background 0.1s;
  }
  .actions button:hover { background: rgba(179,136,255,0.1); }
  .actions button:disabled { opacity: 0.3; cursor: default; }
  .actions button.danger { color: var(--danger); border-color: var(--danger); }
  .actions button.danger:hover { background: rgba(255,64,129,0.1); }

  /* ---- import area ---- */
  #import-wrap { margin-bottom: 24px; }
  #import-wrap textarea {
    width: 100%; height: 110px;
    background: var(--panel); color: var(--text);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    font-family: inherit; font-size: 12px;
    padding: 10px 14px; resize: vertical;
    margin-bottom: 8px;
  }
  #import-wrap textarea:focus { outline: 1px solid var(--accent); }
  #import-status { font-size: 12px; color: var(--ok); min-height: 16px; }

  /* ---- waveform ---- */
  #waveform-wrap {
    position: relative;
    background: var(--panel);
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
    cursor: crosshair;
    display: none;
  }
  #waveform { display: block; width: 100%; height: 110px; }
  #waveform-time-tip {
    position: absolute; top: 6px; right: 10px;
    font-size: 11px; color: var(--dim); pointer-events: none;
    letter-spacing: 1px;
  }
  #waveform-scroll {
    position: relative; height: 10px;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
  }
  #waveform-scroll-thumb {
    position: absolute; top: 1px; bottom: 1px;
    background: rgba(179,136,255,0.55);
    border-radius: 4px;
    min-width: 16px;
  }
  #waveform-scroll-thumb:hover { background: rgba(179,136,255,0.8); }
  #waveform-scroll-thumb.dragging { background: rgba(179,136,255,0.9); }

  /* ---- scrollbar ---- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
</style>
</head>
<body>
<div id="tap-flash"></div>
<div class="page">
<div class="main-col">

  <div class="header">
    <div>
      <h1>TAP RECORDER</h1>
      <h2>game dev beats · dev tool</h2>
    </div>
    <div style="display:flex;align-items:center;gap:0">
      <a href="index.html" id="link-back">← back to game</a>
      <button id="btn-lang">简体中文</button>
    </div>
  </div>

  <!-- File drop -->
  <label class="file-drop" id="file-drop">
    <input type="file" id="file-input" accept="audio/*,.csv,text/csv">
    <div class="label">DROP MP3 OR CSV HERE · or click to browse</div>
    <div class="sub">audio plays in browser · csv loads as taps · no upload</div>
  </label>
  <div id="file-status"></div>

  <!-- Layer selector -->
  <div class="layer-selector">
    <span class="lbl" id="lbl-layer">LAYER</span>
    <button class="layer-btn active" data-layer="1">1</button>
    <button class="layer-btn"        data-layer="2">2</button>
    <button class="layer-btn"        data-layer="3">3</button>
    <button class="layer-btn"        data-layer="4">4</button>
    <button class="layer-btn"        data-layer="5">5</button>
    <span id="layer-hint" style="font-size:11px;color:var(--dim);margin-left:6px;letter-spacing:1px">keys 1 · 2 · 3 · 4 · 5 to switch</span>
  </div>

  <!-- Show-layer filter -->
  <div class="layer-selector">
    <span class="lbl" id="lbl-show">SHOW</span>
    <button class="layer-show-btn on" data-layer="1">1</button>
    <button class="layer-show-btn on" data-layer="2">2</button>
    <button class="layer-show-btn on" data-layer="3">3</button>
    <button class="layer-show-btn on" data-layer="4">4</button>
    <button class="layer-show-btn on" data-layer="5">5</button>
    <span id="show-hint" style="font-size:11px;color:var(--dim);margin-left:6px;letter-spacing:1px">click to toggle preview</span>
  </div>

  <!-- Waveform -->
  <div id="waveform-wrap">
    <canvas id="waveform"></canvas>
    <div id="waveform-time-tip"></div>
    <div id="waveform-scroll"><div id="waveform-scroll-thumb"></div></div>
  </div>

  <!-- Transport -->
  <div class="transport">
    <button id="btn-play" disabled>PLAY</button>
    <button id="btn-stop" class="secondary" disabled>STOP</button>
    <div id="time-display">0.000</div>
    <div class="speed-group">
      <span class="lbl" id="lbl-speed">SPEED</span>
      <input type="number" id="speed-input" min="0.1" max="4" step="0.05" value="1">
      <span class="suffix">×</span>
    </div>
    <div id="tap-hint">press SPACE to tap a beat</div>
  </div>

  <!-- Tap list -->
  <div class="section-label">recorded taps — <span id="tap-count">0</span></div>
  <div id="tap-list-wrap">
    <div id="empty-msg">no taps yet · load a track and press play, then tap spacebar</div>
    <table id="tap-list" style="display:none">
      <thead><tr>
        <th>#</th>
        <th>tSec</th>
        <th id="th-layer">layer</th>
        <th></th>
      </tr></thead>
      <tbody id="tap-tbody"></tbody>
    </table>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button id="btn-undo" disabled>UNDO LAST</button>
    <button id="btn-export-csv" disabled>EXPORT CSV</button>
    <button id="btn-copy-csv" disabled>COPY CSV</button>
    <button id="btn-clear" class="danger" disabled>CLEAR ALL</button>
  </div>

  <!-- Import -->
  <div id="import-wrap">
    <div class="section-label">import csv</div>
    <textarea id="import-textarea" placeholder="paste CSV here (tSec,band,strength — one row per beat, header optional)"></textarea>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="actions" style="margin:0">
        <button id="btn-import">IMPORT</button>
      </div>
      <div id="import-status"></div>
    </div>
  </div>

</div><!-- .main-col -->

<div class="viz-col">
  <div class="viz-label" id="viz-label">preview</div>
  <canvas id="viz-canvas"></canvas>
</div>

</div><!-- .page -->

<script>
// ---------------------------------------------------------------------------
// Audio state
// ---------------------------------------------------------------------------
let audioCtx = null;
let audioBuffer = null;
let playSource = null;
let playStartCtxTime = 0;
let playStartOffset = 0;
let isPlaying = false;
let playbackRate = 1.0;

function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function currentAudioTime() {
  if (!isPlaying) return playStartOffset;
  return playStartOffset + (audioCtx.currentTime - playStartCtxTime) * playbackRate;
}

// ---------------------------------------------------------------------------
// Waveform
// ---------------------------------------------------------------------------
const waveWrap   = document.getElementById('waveform-wrap');
const waveCanvas = document.getElementById('waveform');
const waveTimeTip = document.getElementById('waveform-time-tip');
let waveformPeaks = null;          // Float32Array of per-pixel max-abs amplitude for the current view
let peaksWidthPx  = 0;             // pixel width the peaks were built for
let viewStartSec  = 0;             // left edge of visible window in audio time
let viewSpanSec   = 0;             // visible window width in seconds
const ZOOM_MIN_SPAN_SEC = 0.05;    // most-zoomed-in: 50 ms across the canvas

function clampView() {
  if (!audioBuffer) return;
  const dur = audioBuffer.duration;
  viewSpanSec  = Math.max(ZOOM_MIN_SPAN_SEC, Math.min(dur, viewSpanSec));
  viewStartSec = Math.max(0, Math.min(dur - viewSpanSec, viewStartSec));
}

function rebuildWaveformPeaks(pixelWidth) {
  if (!audioBuffer || pixelWidth <= 0) { waveformPeaks = null; return; }
  const ch = audioBuffer.getChannelData(0);
  const sr = audioBuffer.sampleRate;
  const startSample = Math.max(0, Math.floor(viewStartSec * sr));
  const endSample   = Math.min(ch.length, Math.ceil((viewStartSec + viewSpanSec) * sr));
  const span = endSample - startSample;
  const peaks = new Float32Array(pixelWidth);
  if (span <= 0) { waveformPeaks = peaks; peaksWidthPx = pixelWidth; return; }
  for (let px = 0; px < pixelWidth; px++) {
    const s = startSample + Math.floor((px / pixelWidth) * span);
    const e = startSample + Math.floor(((px + 1) / pixelWidth) * span);
    let max = 0;
    for (let i = s; i < e; i++) {
      const v = Math.abs(ch[i]);
      if (v > max) max = v;
    }
    peaks[px] = max;
  }
  waveformPeaks = peaks;
  peaksWidthPx  = pixelWidth;
}

function secToCanvasX(t, W) { return ((t - viewStartSec) / viewSpanSec) * W; }
function canvasXToSec(x, W) { return viewStartSec + (x / W) * viewSpanSec; }

function drawWaveform(playheadSec) {
  if (!audioBuffer) return;
  const dpr = window.devicePixelRatio || 1;
  const W = waveCanvas.clientWidth;
  const H = waveCanvas.clientHeight;
  if (waveCanvas.width !== W * dpr || waveCanvas.height !== H * dpr) {
    waveCanvas.width  = W * dpr;
    waveCanvas.height = H * dpr;
  }
  if (!waveformPeaks || peaksWidthPx !== W) rebuildWaveformPeaks(W);

  const ctx = waveCanvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  const mid = H / 2;

  // Waveform bars
  ctx.fillStyle = 'rgba(179,136,255,0.35)';
  for (let px = 0; px < waveformPeaks.length; px++) {
    const amp = waveformPeaks[px] * (mid - 4);
    ctx.fillRect(px, mid - amp, 1, amp * 2);
  }

  // Tap markers (colored by layer; filtered by visibleLayers)
  for (const tap of taps) {
    if (!visibleLayers.has(tap.layer)) continue;
    const x = secToCanvasX(tap.tSec, W);
    if (x < -1 || x > W + 1) continue;
    ctx.fillStyle = layerColor(tap.layer) + 'cc';
    ctx.fillRect(x - 0.5, 0, 1, H);
  }

  // Playhead
  if (playheadSec >= 0) {
    const x = secToCanvasX(playheadSec, W);
    if (x >= 0 && x <= W) {
      ctx.fillStyle = '#ff4081';
      ctx.fillRect(x - 1, 0, 2, H);
    }
  }
}

function setupWaveformAfterLoad() {
  waveWrap.style.display = 'block';
  viewStartSec = 0;
  viewSpanSec  = audioBuffer.duration;
  const W = waveCanvas.clientWidth || 712;
  rebuildWaveformPeaks(W);
  drawWaveform(0);
  updateScrollbar();
}

// Click/drag to seek  +  drag tap markers to adjust timing
const TAP_HIT_PX = 8; // px radius for grabbing a tap line
let seekDragging = false;
let tapDragIndex = -1; // index into taps[] being dragged, or -1

function eventToSec(e) {
  if (!audioBuffer) return 0;
  const rect = waveCanvas.getBoundingClientRect();
  const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
  return Math.max(0, Math.min(audioBuffer.duration, canvasXToSec(x, rect.width)));
}

function nearestTapIndex(e) {
  if (!audioBuffer || taps.length === 0) return -1;
  const rect = waveCanvas.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  let best = -1, bestDist = TAP_HIT_PX;
  for (let i = 0; i < taps.length; i++) {
    const tx = secToCanvasX(taps[i].tSec, rect.width);
    if (tx < -TAP_HIT_PX || tx > rect.width + TAP_HIT_PX) continue;
    const d = Math.abs(mouseX - tx);
    if (d < bestDist) { bestDist = d; best = i; }
  }
  return best;
}

waveWrap.addEventListener('mousedown', e => {
  const idx = nearestTapIndex(e);
  if (idx !== -1) {
    tapDragIndex = idx;
    waveWrap.style.cursor = 'ew-resize';
  } else {
    seekDragging = true;
    seekToEvent(e);
  }
});

window.addEventListener('mousemove', e => {
  if (tapDragIndex !== -1) {
    const t = eventToSec(e);
    taps = taps.map((tap, i) => i === tapDragIndex ? { ...tap, tSec: parseFloat(t.toFixed(4)) } : tap);
    renderTaps();
    waveTimeTip.textContent = taps[tapDragIndex].tSec.toFixed(3) + 's';
  } else if (seekDragging) {
    seekToEvent(e);
  }
});

window.addEventListener('mouseup', () => {
  if (tapDragIndex !== -1) {
    // Re-sort taps by time and update drag index to follow the moved tap
    const movedTSec = taps[tapDragIndex].tSec;
    taps = [...taps].sort((a, b) => a.tSec - b.tSec);
    tapDragIndex = taps.findIndex(t => t.tSec === movedTSec);
    renderTaps();
    tapDragIndex = -1;
    waveWrap.style.cursor = 'crosshair';
  }
  seekDragging = false;
});

function seekToEvent(e) {
  if (!audioBuffer) return;
  const t = eventToSec(e);
  playStartOffset = t;
  if (isPlaying) startPlay(t);
  else updateTimeDisplay();
}

// Hover: change cursor near tap lines, show time + zoom info
waveWrap.addEventListener('mousemove', e => {
  if (tapDragIndex !== -1 || seekDragging) return;
  if (!audioBuffer) return;
  const idx = nearestTapIndex(e);
  waveWrap.style.cursor = idx !== -1 ? 'ew-resize' : 'crosshair';
  const t = eventToSec(e);
  const zoom = audioBuffer.duration / viewSpanSec;
  waveTimeTip.textContent = `${t.toFixed(3)}s · ${zoom.toFixed(1)}×`;
});
waveWrap.addEventListener('mouseleave', () => {
  waveTimeTip.textContent = '';
  if (tapDragIndex === -1) waveWrap.style.cursor = 'crosshair';
});

// Wheel: zoom centered on cursor. Shift+wheel: pan horizontally.
waveWrap.addEventListener('wheel', e => {
  if (!audioBuffer) return;
  e.preventDefault();
  const rect = waveCanvas.getBoundingClientRect();
  if (e.shiftKey) {
    const panSec = (e.deltaY / rect.width) * viewSpanSec;
    viewStartSec += panSec;
    clampView();
  } else {
    const mouseFrac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const tAtCursor = viewStartSec + mouseFrac * viewSpanSec;
    const factor    = e.deltaY < 0 ? 0.85 : 1.18;
    viewSpanSec     = Math.max(ZOOM_MIN_SPAN_SEC, Math.min(audioBuffer.duration, viewSpanSec * factor));
    viewStartSec    = tAtCursor - mouseFrac * viewSpanSec;
    clampView();
  }
  rebuildWaveformPeaks(waveCanvas.clientWidth || 712);
  drawWaveform(currentAudioTime());
  updateScrollbar();
}, { passive: false });

// Double-click empty area: reset zoom to fit
waveWrap.addEventListener('dblclick', e => {
  if (!audioBuffer) return;
  if (nearestTapIndex(e) !== -1) return; // don't reset when double-clicking a tap line
  viewStartSec = 0;
  viewSpanSec  = audioBuffer.duration;
  rebuildWaveformPeaks(waveCanvas.clientWidth || 712);
  drawWaveform(currentAudioTime());
  updateScrollbar();
});

window.addEventListener('resize', () => {
  if (!audioBuffer) return;
  rebuildWaveformPeaks(waveCanvas.clientWidth || 712);
  drawWaveform(currentAudioTime());
  updateScrollbar();
});

// Scrollbar: thumb shows visible window vs. full track. Drag to pan; click empty area to jump.
const scrollTrack = document.getElementById('waveform-scroll');
const scrollThumb = document.getElementById('waveform-scroll-thumb');
function updateScrollbar() {
  if (!audioBuffer) { scrollThumb.style.display = 'none'; return; }
  scrollThumb.style.display = '';
  const dur = audioBuffer.duration;
  const trackW = scrollTrack.clientWidth || 1;
  const thumbW = Math.max(16, (viewSpanSec / dur) * trackW);
  const maxLeft = Math.max(0, trackW - thumbW);
  const fracStart = dur > viewSpanSec ? viewStartSec / (dur - viewSpanSec) : 0;
  scrollThumb.style.left  = (fracStart * maxLeft) + 'px';
  scrollThumb.style.width = thumbW + 'px';
}
let scrollDragOffsetPx = 0;
function panFromThumbLeftPx(leftPx) {
  if (!audioBuffer) return;
  const dur = audioBuffer.duration;
  const trackW = scrollTrack.clientWidth || 1;
  const thumbW = Math.max(16, (viewSpanSec / dur) * trackW);
  const maxLeft = Math.max(1, trackW - thumbW);
  const clamped = Math.max(0, Math.min(maxLeft, leftPx));
  const frac = clamped / maxLeft;
  viewStartSec = frac * (dur - viewSpanSec);
  clampView();
  rebuildWaveformPeaks(waveCanvas.clientWidth || 712);
  drawWaveform(currentAudioTime());
  updateScrollbar();
}
scrollThumb.addEventListener('mousedown', e => {
  e.preventDefault();
  scrollThumb.classList.add('dragging');
  const rect = scrollTrack.getBoundingClientRect();
  const thumbRect = scrollThumb.getBoundingClientRect();
  scrollDragOffsetPx = e.clientX - thumbRect.left;
  function onMove(ev) {
    const leftPx = ev.clientX - rect.left - scrollDragOffsetPx;
    panFromThumbLeftPx(leftPx);
  }
  function onUp() {
    scrollThumb.classList.remove('dragging');
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  }
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
});
scrollTrack.addEventListener('mousedown', e => {
  if (e.target === scrollThumb) return; // thumb handles its own drag
  const rect = scrollTrack.getBoundingClientRect();
  const thumbW = scrollThumb.clientWidth;
  panFromThumbLeftPx(e.clientX - rect.left - thumbW / 2);
});

// Layer system

const LAYER_COLORS = ['#00e5ff', '#ffd54f', '#ff4081', '#69f0ae', '#b388ff'];
const LAYER_COUNT = LAYER_COLORS.length;
function layerColor(layer) { return LAYER_COLORS[(layer ?? 1) - 1] || LAYER_COLORS[0]; }
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

let activeLayer = 1;

function setActiveLayer(n) {
  activeLayer = n;
  document.querySelectorAll('.layer-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.layer, 10) === n);
  });
}

document.querySelectorAll('.layer-btn').forEach(b => {
  b.addEventListener('click', () => { setActiveLayer(parseInt(b.dataset.layer, 10)); b.blur(); });
});

// Multi-select layer visibility filter — controls waveform markers and viz preview.
const visibleLayers = new Set([1, 2, 3, 4, 5]);
document.querySelectorAll('.layer-show-btn').forEach(b => {
  b.addEventListener('click', () => {
    const L = parseInt(b.dataset.layer, 10);
    if (visibleLayers.has(L)) visibleLayers.delete(L);
    else visibleLayers.add(L);
    b.classList.toggle('on', visibleLayers.has(L));
    b.blur();
    drawWaveform(currentAudioTime());
  });
});

// ---------------------------------------------------------------------------
// File loading
// ---------------------------------------------------------------------------
async function loadAudioFile(file) {
  ensureCtx();
  fileStatusEl.style.color = 'var(--ok)';
  fileStatusEl.textContent = 'decoding…';
  try {
    const arr = await file.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(arr);
    fileStatusEl.textContent = `✓ ${file.name} · ${audioBuffer.duration.toFixed(1)}s`;
    btnPlay.disabled = false;
    playStartOffset = 0;
    updateTimeDisplay();
    setupWaveformAfterLoad();
  } catch (err) {
    fileStatusEl.textContent = 'error: ' + err.message;
    fileStatusEl.style.color = 'var(--danger)';
  }
}

async function loadCsvFile(file) {
  try {
    const text = await file.text();
    const parsed = fromCsv(text);
    if (parsed.length === 0) {
      fileStatusEl.style.color = 'var(--warn)';
      fileStatusEl.textContent = `${file.name}: no valid rows found`;
      return;
    }
    taps = parsed;
    renderTaps();
    fileStatusEl.style.color = 'var(--ok)';
    fileStatusEl.textContent = `✓ ${file.name} · imported ${parsed.length} taps`;
  } catch (err) {
    fileStatusEl.style.color = 'var(--danger)';
    fileStatusEl.textContent = 'csv error: ' + err.message;
  }
}

function isCsvFile(file) {
  if (!file) return false;
  if (/^text\/csv$/i.test(file.type)) return true;
  if (/\.(csv|txt)$/i.test(file.name)) return true;
  return false;
}

function loadDropped(file) {
  if (!file) return;
  if (isCsvFile(file)) loadCsvFile(file);
  else loadAudioFile(file);
}

fileInputEl.addEventListener('change', () => {
  if (fileInputEl.files[0]) loadDropped(fileInputEl.files[0]);
});
fileDropEl.addEventListener('dragover', e => { e.preventDefault(); fileDropEl.classList.add('drag'); });
fileDropEl.addEventListener('dragleave', () => fileDropEl.classList.remove('drag'));
fileDropEl.addEventListener('drop', e => {
  e.preventDefault();
  fileDropEl.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) loadDropped(f);
});

// ---------------------------------------------------------------------------
// Transport
// ---------------------------------------------------------------------------
function startPlay(fromSec) {
  if (!audioBuffer) return;
  ensureCtx();
  stopPlay();
  playSource = audioCtx.createBufferSource();
  playSource.buffer = audioBuffer;
  playSource.playbackRate.value = playbackRate;
  playSource.connect(audioCtx.destination);
  playStartOffset = Math.max(0, fromSec ?? playStartOffset);
  playStartCtxTime = audioCtx.currentTime;
  playSource.start(0, playStartOffset);
  playSource.onended = () => {
    if (isPlaying) { isPlaying = false; syncTransport(); }
  };
  isPlaying = true;
  syncTransport();
}

function stopPlay() {
  if (playSource) {
    try { playSource.stop(); } catch (_) {}
    playSource = null;
  }
  if (isPlaying) {
    playStartOffset = currentAudioTime();
    isPlaying = false;
  }
  syncTransport();
}

function syncTransport() {
  const s = STRINGS[lang];
  btnPlay.textContent = isPlaying ? s.btnPause : s.btnPlay;
  btnStop.disabled = !isPlaying && playStartOffset === 0;
}

btnPlay.addEventListener('click', () => {
  ensureCtx();
  if (isPlaying) stopPlay();
  else startPlay(playStartOffset);
  btnPlay.blur();
});

btnStop.addEventListener('click', () => {
  stopPlay();
  playStartOffset = 0;
  updateTimeDisplay();
  syncTransport();
  btnStop.blur();
});

const speedInput = document.getElementById('speed-input');
function applySpeedFromInput() {
  const r = parseFloat(speedInput.value);
  if (!Number.isFinite(r) || r <= 0) {
    speedInput.value = playbackRate;       // reject invalid, revert display
    return;
  }
  const clamped = Math.max(0.1, Math.min(4, r));
  if (clamped !== r) speedInput.value = clamped;
  if (clamped === playbackRate) return;
  const wasPlaying = isPlaying;
  if (isPlaying) stopPlay();               // captures current audio time into playStartOffset
  playbackRate = clamped;
  if (wasPlaying) startPlay(playStartOffset);
}
speedInput.addEventListener('change', applySpeedFromInput);
speedInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { applySpeedFromInput(); speedInput.blur(); }
  if (e.key === ' ') e.stopPropagation();  // don't trigger tap while editing speed
});

// Time display RAF loop
function updateTimeDisplay() {
  timeDisplay.textContent = Math.max(0, currentAudioTime()).toFixed(3);
}
function raf() {
  const t = Math.max(0, currentAudioTime());
  timeDisplay.textContent = t.toFixed(3);
  drawWaveform(t);
  drawViz();
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

// ---------------------------------------------------------------------------
// Tap recording
// ---------------------------------------------------------------------------
function recordTap() {
  if (!isPlaying) return;
  const t = currentAudioTime();
  taps = [...taps, { tSec: parseFloat(t.toFixed(4)), band: 0, strength: 1.0, layer: activeLayer }];
  flashScreen();
  renderTaps();
}

function flashScreen() {
  tapFlash.classList.remove('on');
  void tapFlash.offsetWidth;
  tapFlash.classList.add('on');
  setTimeout(() => tapFlash.classList.remove('on'), 80);
}

document.addEventListener('keydown', e => {
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    if (isPlaying) recordTap();
    else if (audioBuffer) { ensureCtx(); startPlay(playStartOffset); }
  }
  if (!e.repeat && /^[1-5]$/.test(e.key)) {
    setActiveLayer(parseInt(e.key, 10));
  }
});

// ---------------------------------------------------------------------------
// Render taps
// ---------------------------------------------------------------------------
function renderTaps() {
  drawWaveform(currentAudioTime());
  tapCountEl.textContent = taps.length;
  btnUndo.disabled    = taps.length === 0;
  btnExport.disabled  = taps.length === 0;
  btnCopy.disabled    = taps.length === 0;
  btnClear.disabled   = taps.length === 0;

  if (taps.length === 0) {
    emptyMsg.style.display = '';
    tapTable.style.display = 'none';
    return;
  }
  emptyMsg.style.display = 'none';
  tapTable.style.display = '';

  tapTbody.innerHTML = '';
  const latest = taps.length - 1;
  taps.forEach((tap, i) => {
    const tr = document.createElement('tr');
    if (i === latest) tr.className = 'latest';

    const numTd  = document.createElement('td');
    numTd.textContent = i + 1;

    const secTd  = document.createElement('td');
    const input  = document.createElement('input');
    input.type      = 'text';
    input.className = 'tsec-input';
    input.value     = tap.tSec.toFixed(4);
    input.dataset.i = i;
    input.addEventListener('change', e => {
      const val = parseFloat(e.target.value);
      if (isNaN(val) || val < 0) { e.target.value = taps[i].tSec.toFixed(4); return; }
      taps = taps.map((t, idx) => idx === parseInt(e.target.dataset.i, 10) ? { ...t, tSec: parseFloat(val.toFixed(4)) } : t);
      taps = [...taps].sort((a, b) => a.tSec - b.tSec);
      renderTaps();
    });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === ' ') e.stopPropagation(); });
    secTd.appendChild(input);

    const layerTd   = document.createElement('td');
    const badge     = document.createElement('span');
    badge.className = 'layer-badge';
    badge.style.background = layerColor(tap.layer);
    badge.title     = `layer ${tap.layer} — click to cycle`;
    badge.dataset.i = i;
    layerTd.appendChild(badge);

    const delTd = document.createElement('td');
    const btn   = document.createElement('button');
    btn.className    = 'tap-del';
    btn.dataset.i    = i;
    btn.title        = 'delete';
    btn.textContent  = '×';
    delTd.appendChild(btn);

    tr.append(numTd, secTd, layerTd, delTd);
    tapTbody.appendChild(tr);
  });

  // Scroll to bottom
  const wrap = document.getElementById('tap-list-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}

tapTbody.addEventListener('click', e => {
  const del = e.target.closest('.tap-del');
  if (del) {
    const i = parseInt(del.dataset.i, 10);
    taps = taps.filter((_, idx) => idx !== i);
    renderTaps();
    return;
  }
  const badge = e.target.closest('.layer-badge');
  if (badge) {
    const i = parseInt(badge.dataset.i, 10);
    taps = taps.map((t, idx) => idx === i ? { ...t, layer: (t.layer % LAYER_COUNT) + 1 } : t);
    renderTaps();
  }
});

// ---------------------------------------------------------------------------
// Undo / Clear
// ---------------------------------------------------------------------------
btnUndo.addEventListener('click', () => {
  taps = taps.slice(0, -1);
  renderTaps();
});

btnClear.addEventListener('click', () => {
  if (!confirm(STRINGS[lang].confirmClear)) return;
  taps = [];
  renderTaps();
});

// ---------------------------------------------------------------------------
// CSV helpers
// ---------------------------------------------------------------------------
function toCsv() {
  const rows = ['tSec,band,strength,layer', ...taps.map(t => `${t.tSec},${t.band},${t.strength},${t.layer ?? 1}`)];
  return rows.join('\n');
}

function fromCsv(text) {
  const lines = text.trim().split(/\r?\n/).filter(Boolean);
  const result = [];
  for (const line of lines) {
    if (/^tSec/i.test(line)) continue;
    const [tSec, band, strength, layer] = line.split(',').map(s => s.trim());
    const t = parseFloat(tSec);
    if (isNaN(t)) continue;
    const b = parseInt(band   ?? '0',   10);
    const s = parseFloat(strength ?? '1.0');
    const l = parseInt(layer  ?? '1',   10);
    result.push({ tSec: t, band: isNaN(b) ? 0 : b, strength: isNaN(s) ? 1.0 : s, layer: (l >= 1 && l <= LAYER_COUNT) ? l : 1 });
  }
  return result.sort((a, b) => a.tSec - b.tSec);
}

// ---------------------------------------------------------------------------
// Export / Import
// ---------------------------------------------------------------------------
btnExport.addEventListener('click', () => {
  const csv = toCsv();
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gamedev-beats.csv';
  a.click();
  URL.revokeObjectURL(url);
});

btnCopy.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(toCsv());
    const orig = btnCopy.textContent;
    btnCopy.textContent = STRINGS[lang].btnCopied;
    setTimeout(() => { btnCopy.textContent = STRINGS[lang].btnCopy; }, 1200);
  } catch (_) {
    importTA.value = toCsv();
    importTA.select();
  }
});

btnImport.addEventListener('click', () => {
  const parsed = fromCsv(importTA.value);
  if (parsed.length === 0) {
    importStatus.textContent = lang === 'zh' ? '未找到有效行' : 'no valid rows found';
    importStatus.style.color = 'var(--warn)';
    return;
  }
  taps = parsed;
  renderTaps();
  importStatus.textContent = lang === 'zh' ? `✓ 已导入 ${parsed.length} 个点击` : `✓ imported ${parsed.length} taps`;
  importStatus.style.color = 'var(--ok)';
});

// ---------------------------------------------------------------------------
// Visualizer — vertical single-lane note preview
// ---------------------------------------------------------------------------
const VIZ_TRAVEL_MS  = 1800;  // matches Game Dev Beats NOTE_TRAVEL_MS
const VIZ_SPAWN_FRAC = 0.08;  // note spawns at 8% from top
const VIZ_HIT_FRAC   = 0.85;  // hit zone at 85% from top
const VIZ_SPAWN_SIZE = 6;
const VIZ_HIT_SIZE   = 52;
const VIZ_EXIT_SIZE  = 76;

const vizCanvas = document.getElementById('viz-canvas');

function resizeVizCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const W = 140, H = Math.round(window.innerHeight * 0.72);
  vizCanvas.style.height = H + 'px';
  if (vizCanvas.width !== W * dpr || vizCanvas.height !== H * dpr) {
    vizCanvas.width  = W * dpr;
    vizCanvas.height = H * dpr;
  }
}
resizeVizCanvas();
window.addEventListener('resize', resizeVizCanvas);

function drawViz() {
  resizeVizCanvas();
  const dpr  = window.devicePixelRatio || 1;
  const W    = vizCanvas.width  / dpr;
  const H    = vizCanvas.height / dpr;
  const ctx  = vizCanvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  const cx      = W / 2;
  const spawnY  = H * VIZ_SPAWN_FRAC;
  const hitY    = H * VIZ_HIT_FRAC;
  const nowSec  = currentAudioTime();

  // Track rail
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx, spawnY); ctx.lineTo(cx, hitY); ctx.stroke();

  // Hit zone ring
  const ringR = VIZ_HIT_SIZE / 2 + 6;
  ctx.strokeStyle = 'rgba(179,136,255,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, hitY, ringR, 0, Math.PI * 2); ctx.stroke();

  // Notes
  const travelSec = VIZ_TRAVEL_MS / 1000;
  for (const tap of taps) {
    if (!visibleLayers.has(tap.layer)) continue;
    const t = 1 - (tap.tSec - nowSec) / travelSec; // 0=spawn, 1=hit
    if (t < 0 || t > 1.35) continue;

    const y = spawnY + (hitY - spawnY) * Math.min(t, 1);
    let size, alpha;
    if (t <= 1) {
      size  = VIZ_SPAWN_SIZE + (VIZ_HIT_SIZE  - VIZ_SPAWN_SIZE)  * t;
      alpha = 0.4 + 0.6 * t;
    } else {
      const k = (t - 1) / 0.35;
      size  = VIZ_HIT_SIZE  + (VIZ_EXIT_SIZE  - VIZ_HIT_SIZE)   * k;
      alpha = 1 - k * 0.8;
    }
    const r   = size / 2;
    const col = layerColor(tap.layer);
    const rgb = hexToRgb(col);

    if (t <= 1) {
      // Approaching the hit zone: filled core + glow
      const grd = ctx.createRadialGradient(cx, y, 0, cx, y, r * 1.6);
      grd.addColorStop(0, `rgba(${rgb},${(alpha * 0.5).toFixed(2)})`);
      grd.addColorStop(1, `rgba(${rgb},0)`);
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(cx, y, r * 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(${rgb},${alpha.toFixed(2)})`;
      ctx.beginPath(); ctx.arc(cx, y, r, 0, Math.PI * 2); ctx.fill();
    } else {
      // After the hit point: hollow ring, no glow
      ctx.strokeStyle = `rgba(${rgb},${alpha.toFixed(2)})`;
      ctx.lineWidth   = 2;
      ctx.beginPath(); ctx.arc(cx, y, r, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // "no taps" hint
  if (taps.length === 0) {
    ctx.fillStyle = 'rgba(136,136,136,0.4)';
    ctx.font = '10px Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('tap beats', cx, H / 2);
    ctx.fillText('to preview', cx, H / 2 + 16);
  }
}

    emptyMsg:      '暂无节拍 · 加载音轨并按播放，然后按空格键',
    btnUndo:       '撤销最后一个',
    btnExport:     '导出 CSV',
    btnCopy:       '复制 CSV',
    btnCopied:     '已复制！',
    btnClear:      '全部清除',
    sectionImport: '导入 CSV',
    importPH:      '粘贴 CSV（tSec,band,strength — 每行一个节拍，表头可选）',
    btnImport:     '导入',
    vizLabel:      '预览',
    lblLayer:      '层级',
    lblSpeed:      '速度',
    lblShow:       '显示',
    layerHint:     '按键 1 · 2 · 3 · 4 · 5 切换',
    showHint:      '点击切换预览',
    thLayer:       '层',
    confirmClear:  '清除所有节拍？',
    noRows:        '未找到有效行',
    imported:      n => `✓ 已导入 ${n} 个节拍`,
  },
};

function applyLang(l) {
  const s = STRINGS[l];
  document.querySelector('h1').textContent = s.h1;
  document.querySelector('h2').textContent = s.h2;
  document.getElementById('link-back').textContent = s.linkBack;
  document.getElementById('btn-lang').textContent = s.btnLang;
  document.querySelector('.file-drop .label').textContent = s.dropLabel;
  document.querySelector('.file-drop .sub').textContent = s.dropSub;
  btnPlay.textContent = isPlaying ? s.btnPause : s.btnPlay;
  btnStop.textContent = s.btnStop;
  document.getElementById('tap-hint').textContent = s.tapHint;
  document.querySelector('.section-label').textContent = s.sectionTaps + ' — ';
  document.querySelector('.section-label').appendChild(
    Object.assign(document.createElement('span'), { id: 'tap-count', textContent: String(taps.length) })
  );
  document.getElementById('empty-msg').textContent = s.emptyMsg;
  btnUndo.textContent   = s.btnUndo;
  btnExport.textContent = s.btnExport;
  btnCopy.textContent   = s.btnCopy;
  btnClear.textContent  = s.btnClear;
  document.querySelector('#import-wrap .section-label').textContent = s.sectionImport;
  importTA.placeholder  = s.importPH;
  document.getElementById('btn-import').textContent = s.btnImport;
  document.getElementById('viz-label').textContent  = s.vizLabel;
  document.getElementById('lbl-layer').textContent  = s.lblLayer;
  document.getElementById('lbl-speed').textContent  = s.lblSpeed;
  document.getElementById('lbl-show').textContent   = s.lblShow;
  document.getElementById('layer-hint').textContent = s.layerHint;
  document.getElementById('show-hint').textContent  = s.showHint;
  const thLayer = document.getElementById('th-layer');
  if (thLayer) thLayer.textContent = s.thLayer;
}

document.getElementById('btn-lang').addEventListener('click', () => {
  lang = lang === 'en' ? 'zh' : 'en';
  applyLang(lang);
  document.getElementById('btn-lang').blur();
});

</script>
