<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crunch Time — Tap Recorder</title>
<style>
  :root {
    --bg: #0a0a14;
    --panel: #14142a;
    --text: #e8e8f0;
    --dim: #888;
    --accent: #b388ff;
    --ok: #69f0ae;
    --warn: #ffd54f;
    --danger: #ff4081;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 14px;
    min-height: 100vh;
  }

  h1 { font-size: 22px; letter-spacing: 3px; }
  h2 { font-size: 13px; color: var(--dim); font-weight: normal; letter-spacing: 2px; margin-top: 4px; }

  .page { max-width: 760px; margin: 0 auto; padding: 32px 24px; }

  /* ---- header ---- */
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; }
  .header a { color: var(--dim); font-size: 12px; text-decoration: none; letter-spacing: 1px; }
  .header a:hover { color: var(--text); }
  #btn-lang {
    background: transparent; color: var(--dim);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
    padding: 5px 12px; font-family: inherit; font-size: 12px;
    cursor: pointer; letter-spacing: 1px; margin-left: 16px;
    transition: color 0.15s, border-color 0.15s;
  }
  #btn-lang:hover { color: var(--text); border-color: rgba(255,255,255,0.35); }

  /* ---- file drop ---- */
  .file-drop {
    display: block;
    border: 2px dashed var(--accent);
    border-radius: 8px;
    padding: 22px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 20px;
  }
  .file-drop:hover, .file-drop.drag { background: rgba(179,136,255,0.08); border-color: var(--text); }
  .file-drop input { display: none; }
  .file-drop .label { color: var(--accent); font-weight: bold; letter-spacing: 2px; }
  .file-drop .sub { color: var(--dim); font-size: 12px; margin-top: 6px; }
  #file-status { color: var(--ok); font-size: 12px; letter-spacing: 1px; min-height: 18px; margin-bottom: 16px; }

  /* ---- transport ---- */
  .transport {
    display: flex; align-items: center; gap: 12px;
    background: var(--panel); border-radius: 8px;
    padding: 14px 18px; margin-bottom: 20px;
  }
  .transport button {
    background: var(--accent); color: var(--bg);
    border: none; padding: 8px 20px;
    font-family: inherit; font-size: 13px; font-weight: bold;
    letter-spacing: 2px; cursor: pointer; border-radius: 4px;
    transition: transform 0.1s;
  }
  .transport button:hover { transform: scale(1.04); }
  .transport button:disabled { opacity: 0.35; cursor: default; transform: none; }
  .transport button.secondary {
    background: transparent; color: var(--dim);
    border: 1px solid var(--dim);
  }
  .transport button.secondary:hover { color: var(--text); border-color: var(--text); }
  #time-display {
    font-size: 20px; letter-spacing: 2px; min-width: 80px;
    color: var(--text);
  }
  #tap-hint {
    flex: 1; text-align: right; color: var(--dim); font-size: 12px; letter-spacing: 1px;
  }

  /* ---- tap flash ---- */
  #tap-flash {
    position: fixed; inset: 0; pointer-events: none;
    background: rgba(179,136,255,0.12);
    opacity: 0; transition: opacity 0.08s;
    z-index: 999;
  }
  #tap-flash.on { opacity: 1; transition: none; }

  /* ---- tap list ---- */
  .section-label {
    font-size: 11px; color: var(--dim); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  #tap-list-wrap {
    background: var(--panel); border-radius: 8px;
    max-height: 320px; overflow-y: auto;
    margin-bottom: 16px;
  }
  #tap-list {
    width: 100%; border-collapse: collapse;
  }
  #tap-list th {
    position: sticky; top: 0;
    background: var(--panel); color: var(--dim);
    font-size: 11px; letter-spacing: 1px;
    text-align: left; padding: 10px 14px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  #tap-list td {
    padding: 6px 14px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  #tap-list tr:last-child td { border-bottom: none; }
  #tap-list tr.latest td { color: var(--ok); }
  .tap-del {
    background: none; border: none; color: var(--danger);
    cursor: pointer; font-size: 13px; padding: 0 4px;
    font-family: inherit;
  }
  .tap-del:hover { color: var(--text); }
  #empty-msg { padding: 24px 14px; color: var(--dim); font-size: 12px; letter-spacing: 1px; }

  /* ---- actions ---- */
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
  .actions button {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent);
    padding: 9px 20px; font-family: inherit; font-size: 12px;
    font-weight: bold; letter-spacing: 2px; cursor: pointer;
    border-radius: 4px; transition: background 0.1s;
  }
  .actions button:hover { background: rgba(179,136,255,0.1); }
  .actions button:disabled { opacity: 0.3; cursor: default; }
  .actions button.danger { color: var(--danger); border-color: var(--danger); }
  .actions button.danger:hover { background: rgba(255,64,129,0.1); }

  /* ---- import area ---- */
  #import-wrap { margin-bottom: 24px; }
  #import-wrap textarea {
    width: 100%; height: 110px;
    background: var(--panel); color: var(--text);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    font-family: inherit; font-size: 12px;
    padding: 10px 14px; resize: vertical;
    margin-bottom: 8px;
  }
  #import-wrap textarea:focus { outline: 1px solid var(--accent); }
  #import-status { font-size: 12px; color: var(--ok); min-height: 16px; }

  /* ---- waveform ---- */
  #waveform-wrap {
    position: relative;
    background: var(--panel);
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
    cursor: crosshair;
    display: none;
  }
  #waveform { display: block; width: 100%; height: 110px; }
  #waveform-time-tip {
    position: absolute; top: 6px; right: 10px;
    font-size: 11px; color: var(--dim); pointer-events: none;
    letter-spacing: 1px;
  }

  /* ---- scrollbar ---- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
</style>
</head>
<body>
<div id="tap-flash"></div>
<div class="page">

  <div class="header">
    <div>
      <h1>TAP RECORDER</h1>
      <h2>crunch time · dev tool</h2>
    </div>
    <div style="display:flex;align-items:center;gap:0">
      <a href="index.html" id="link-back">← back to game</a>
      <button id="btn-lang">简体中文</button>
    </div>
  </div>

  <!-- File drop -->
  <label class="file-drop" id="file-drop">
    <input type="file" id="file-input" accept="audio/*">
    <div class="label">DROP MP3 HERE · or click to browse</div>
    <div class="sub">audio plays in browser · no upload</div>
  </label>
  <div id="file-status"></div>

  <!-- Waveform -->
  <div id="waveform-wrap">
    <canvas id="waveform"></canvas>
    <div id="waveform-time-tip"></div>
  </div>

  <!-- Transport -->
  <div class="transport">
    <button id="btn-play" disabled>PLAY</button>
    <button id="btn-stop" class="secondary" disabled>STOP</button>
    <div id="time-display">0.000</div>
    <div id="tap-hint">press SPACE to tap a beat</div>
  </div>

  <!-- Tap list -->
  <div class="section-label">recorded taps — <span id="tap-count">0</span></div>
  <div id="tap-list-wrap">
    <div id="empty-msg">no taps yet · load a track and press play, then tap spacebar</div>
    <table id="tap-list" style="display:none">
      <thead><tr>
        <th>#</th>
        <th>tSec</th>
        <th>band</th>
        <th>strength</th>
        <th></th>
      </tr></thead>
      <tbody id="tap-tbody"></tbody>
    </table>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button id="btn-undo" disabled>UNDO LAST</button>
    <button id="btn-export-csv" disabled>EXPORT CSV</button>
    <button id="btn-copy-csv" disabled>COPY CSV</button>
    <button id="btn-clear" class="danger" disabled>CLEAR ALL</button>
  </div>

  <!-- Import -->
  <div id="import-wrap">
    <div class="section-label">import csv</div>
    <textarea id="import-textarea" placeholder="paste CSV here (tSec,band,strength — one row per beat, header optional)"></textarea>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="actions" style="margin:0">
        <button id="btn-import">IMPORT</button>
      </div>
      <div id="import-status"></div>
    </div>
  </div>

</div>

<script>
// ---------------------------------------------------------------------------
// Audio state
// ---------------------------------------------------------------------------
let audioCtx = null;
let audioBuffer = null;
let playSource = null;
let playStartCtxTime = 0;
let playStartOffset = 0;
let isPlaying = false;

function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function currentAudioTime() {
  if (!isPlaying) return playStartOffset;
  return playStartOffset + (audioCtx.currentTime - playStartCtxTime);
}

// ---------------------------------------------------------------------------
// Waveform
// ---------------------------------------------------------------------------
const waveWrap   = document.getElementById('waveform-wrap');
const waveCanvas = document.getElementById('waveform');
const waveTimeTip = document.getElementById('waveform-time-tip');
let waveformPeaks = null; // Float32Array of per-pixel max-abs amplitude

function buildWaveformPeaks(buf, pixelWidth) {
  const ch = buf.getChannelData(0);
  const total = ch.length;
  const peaks = new Float32Array(pixelWidth);
  for (let px = 0; px < pixelWidth; px++) {
    const start = Math.floor((px / pixelWidth) * total);
    const end   = Math.floor(((px + 1) / pixelWidth) * total);
    let max = 0;
    for (let i = start; i < end; i++) {
      const v = Math.abs(ch[i]);
      if (v > max) max = v;
    }
    peaks[px] = max;
  }
  return peaks;
}

function drawWaveform(playheadSec) {
  if (!waveformPeaks || !audioBuffer) return;
  const dpr = window.devicePixelRatio || 1;
  const W = waveCanvas.clientWidth;
  const H = waveCanvas.clientHeight;
  if (waveCanvas.width !== W * dpr || waveCanvas.height !== H * dpr) {
    waveCanvas.width  = W * dpr;
    waveCanvas.height = H * dpr;
  }
  const ctx = waveCanvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  const mid = H / 2;
  const dur = audioBuffer.duration;

  // Waveform bars
  ctx.fillStyle = 'rgba(179,136,255,0.35)';
  for (let px = 0; px < waveformPeaks.length; px++) {
    const amp = waveformPeaks[px] * (mid - 4);
    ctx.fillRect(px, mid - amp, 1, amp * 2);
  }

  // Tap markers
  for (const tap of taps) {
    const x = (tap.tSec / dur) * W;
    ctx.fillStyle = 'rgba(105,240,174,0.9)';
    ctx.fillRect(x - 0.5, 0, 1, H);
  }

  // Playhead
  if (playheadSec >= 0) {
    const x = (playheadSec / dur) * W;
    ctx.fillStyle = '#ff4081';
    ctx.fillRect(x - 1, 0, 2, H);
  }
}

function setupWaveformAfterLoad() {
  waveWrap.style.display = 'block';
  const W = waveCanvas.clientWidth || 712;
  waveformPeaks = buildWaveformPeaks(audioBuffer, W);
  drawWaveform(0);
}

// Click/drag to seek  +  drag tap markers to adjust timing
const TAP_HIT_PX = 8; // px radius for grabbing a tap line
let seekDragging = false;
let tapDragIndex = -1; // index into taps[] being dragged, or -1

function eventToFrac(e) {
  const rect = waveCanvas.getBoundingClientRect();
  return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
}

function nearestTapIndex(e) {
  if (!audioBuffer || taps.length === 0) return -1;
  const rect = waveCanvas.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  let best = -1, bestDist = TAP_HIT_PX;
  for (let i = 0; i < taps.length; i++) {
    const tx = (taps[i].tSec / audioBuffer.duration) * rect.width;
    const d = Math.abs(mouseX - tx);
    if (d < bestDist) { bestDist = d; best = i; }
  }
  return best;
}

waveWrap.addEventListener('mousedown', e => {
  const idx = nearestTapIndex(e);
  if (idx !== -1) {
    tapDragIndex = idx;
    waveWrap.style.cursor = 'ew-resize';
  } else {
    seekDragging = true;
    seekToEvent(e);
  }
});

window.addEventListener('mousemove', e => {
  if (tapDragIndex !== -1) {
    const t = eventToFrac(e) * audioBuffer.duration;
    taps = taps.map((tap, i) => i === tapDragIndex ? { ...tap, tSec: parseFloat(t.toFixed(4)) } : tap);
    renderTaps();
    waveTimeTip.textContent = taps[tapDragIndex].tSec.toFixed(3) + 's';
  } else if (seekDragging) {
    seekToEvent(e);
  }
});

window.addEventListener('mouseup', () => {
  if (tapDragIndex !== -1) {
    // Re-sort taps by time and update drag index to follow the moved tap
    const movedTSec = taps[tapDragIndex].tSec;
    taps = [...taps].sort((a, b) => a.tSec - b.tSec);
    tapDragIndex = taps.findIndex(t => t.tSec === movedTSec);
    renderTaps();
    tapDragIndex = -1;
    waveWrap.style.cursor = 'crosshair';
  }
  seekDragging = false;
});

function seekToEvent(e) {
  if (!audioBuffer) return;
  const t = eventToFrac(e) * audioBuffer.duration;
  playStartOffset = t;
  if (isPlaying) startPlay(t);
  else updateTimeDisplay();
}

// Hover: change cursor near tap lines, show time tip
waveWrap.addEventListener('mousemove', e => {
  if (tapDragIndex !== -1 || seekDragging) return;
  if (!audioBuffer) return;
  const idx = nearestTapIndex(e);
  waveWrap.style.cursor = idx !== -1 ? 'ew-resize' : 'crosshair';
  const rect = waveWrap.getBoundingClientRect();
  const t = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * audioBuffer.duration;
  waveTimeTip.textContent = t.toFixed(3) + 's';
});
waveWrap.addEventListener('mouseleave', () => {
  waveTimeTip.textContent = '';
  if (tapDragIndex === -1) waveWrap.style.cursor = 'crosshair';
});

// ---------------------------------------------------------------------------
// Taps state  [ {tSec, band, strength} ]
// ---------------------------------------------------------------------------
let taps = [];

// ---------------------------------------------------------------------------
// UI refs
// ---------------------------------------------------------------------------
const fileDropEl   = document.getElementById('file-drop');
const fileInputEl  = document.getElementById('file-input');
const fileStatusEl = document.getElementById('file-status');
const btnPlay      = document.getElementById('btn-play');
const btnStop      = document.getElementById('btn-stop');
const timeDisplay  = document.getElementById('time-display');
const tapHint      = document.getElementById('tap-hint');
const tapCountEl   = document.getElementById('tap-count');
const emptyMsg     = document.getElementById('empty-msg');
const tapTable     = document.getElementById('tap-list');
const tapTbody     = document.getElementById('tap-tbody');
const btnUndo      = document.getElementById('btn-undo');
const btnExport    = document.getElementById('btn-export-csv');
const btnCopy      = document.getElementById('btn-copy-csv');
const btnClear     = document.getElementById('btn-clear');
const btnImport    = document.getElementById('btn-import');
const importTA     = document.getElementById('import-textarea');
const importStatus = document.getElementById('import-status');
const tapFlash     = document.getElementById('tap-flash');

// ---------------------------------------------------------------------------
// File loading
// ---------------------------------------------------------------------------
async function loadFile(file) {
  ensureCtx();
  fileStatusEl.textContent = 'decoding…';
  try {
    const arr = await file.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(arr);
    fileStatusEl.textContent = `✓ ${file.name} · ${audioBuffer.duration.toFixed(1)}s`;
    btnPlay.disabled = false;
    playStartOffset = 0;
    updateTimeDisplay();
    setupWaveformAfterLoad();
  } catch (err) {
    fileStatusEl.textContent = 'error: ' + err.message;
    fileStatusEl.style.color = 'var(--danger)';
  }
}

fileInputEl.addEventListener('change', () => {
  if (fileInputEl.files[0]) loadFile(fileInputEl.files[0]);
});
fileDropEl.addEventListener('dragover', e => { e.preventDefault(); fileDropEl.classList.add('drag'); });
fileDropEl.addEventListener('dragleave', () => fileDropEl.classList.remove('drag'));
fileDropEl.addEventListener('drop', e => {
  e.preventDefault();
  fileDropEl.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});

// ---------------------------------------------------------------------------
// Transport
// ---------------------------------------------------------------------------
function startPlay(fromSec) {
  if (!audioBuffer) return;
  ensureCtx();
  stopPlay();
  playSource = audioCtx.createBufferSource();
  playSource.buffer = audioBuffer;
  playSource.connect(audioCtx.destination);
  playStartOffset = Math.max(0, fromSec ?? playStartOffset);
  playStartCtxTime = audioCtx.currentTime;
  playSource.start(0, playStartOffset);
  playSource.onended = () => {
    if (isPlaying) { isPlaying = false; syncTransport(); }
  };
  isPlaying = true;
  syncTransport();
}

function stopPlay() {
  if (playSource) {
    try { playSource.stop(); } catch (_) {}
    playSource = null;
  }
  if (isPlaying) {
    playStartOffset = currentAudioTime();
    isPlaying = false;
  }
  syncTransport();
}

function syncTransport() {
  btnPlay.textContent = isPlaying ? 'PAUSE' : 'PLAY';
  btnStop.disabled = !isPlaying && playStartOffset === 0;
}

btnPlay.addEventListener('click', () => {
  ensureCtx();
  if (isPlaying) stopPlay();
  else startPlay(playStartOffset);
  btnPlay.blur();
});

btnStop.addEventListener('click', () => {
  stopPlay();
  playStartOffset = 0;
  updateTimeDisplay();
  syncTransport();
  btnStop.blur();
});

// Time display RAF loop
function updateTimeDisplay() {
  timeDisplay.textContent = Math.max(0, currentAudioTime()).toFixed(3);
}
function raf() {
  const t = Math.max(0, currentAudioTime());
  timeDisplay.textContent = t.toFixed(3);
  drawWaveform(t);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

// ---------------------------------------------------------------------------
// Tap recording
// ---------------------------------------------------------------------------
function recordTap() {
  if (!isPlaying) return;
  const t = currentAudioTime();
  taps = [...taps, { tSec: parseFloat(t.toFixed(4)), band: 0, strength: 1.0 }];
  flashScreen();
  renderTaps();
}

function flashScreen() {
  tapFlash.classList.remove('on');
  void tapFlash.offsetWidth;
  tapFlash.classList.add('on');
  setTimeout(() => tapFlash.classList.remove('on'), 80);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    if (isPlaying) recordTap();
    else if (audioBuffer) { ensureCtx(); startPlay(playStartOffset); }
  }
});

// ---------------------------------------------------------------------------
// Render taps
// ---------------------------------------------------------------------------
function renderTaps() {
  drawWaveform(currentAudioTime());
  tapCountEl.textContent = taps.length;
  btnUndo.disabled    = taps.length === 0;
  btnExport.disabled  = taps.length === 0;
  btnCopy.disabled    = taps.length === 0;
  btnClear.disabled   = taps.length === 0;

  if (taps.length === 0) {
    emptyMsg.style.display = '';
    tapTable.style.display = 'none';
    return;
  }
  emptyMsg.style.display = 'none';
  tapTable.style.display = '';

  tapTbody.innerHTML = '';
  const latest = taps.length - 1;
  taps.forEach((tap, i) => {
    const tr = document.createElement('tr');
    if (i === latest) tr.className = 'latest';
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${tap.tSec.toFixed(4)}</td>
      <td>${tap.band}</td>
      <td>${tap.strength.toFixed(1)}</td>
      <td><button class="tap-del" data-i="${i}" title="delete">×</button></td>
    `;
    tapTbody.appendChild(tr);
  });

  // Scroll to bottom
  const wrap = document.getElementById('tap-list-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}

tapTbody.addEventListener('click', e => {
  const btn = e.target.closest('.tap-del');
  if (!btn) return;
  const i = parseInt(btn.dataset.i, 10);
  taps = taps.filter((_, idx) => idx !== i);
  renderTaps();
});

// ---------------------------------------------------------------------------
// Undo / Clear
// ---------------------------------------------------------------------------
btnUndo.addEventListener('click', () => {
  taps = taps.slice(0, -1);
  renderTaps();
});

btnClear.addEventListener('click', () => {
  if (!confirm(STRINGS[lang].confirmClear)) return;
  taps = [];
  renderTaps();
});

// ---------------------------------------------------------------------------
// CSV helpers
// ---------------------------------------------------------------------------
function toCsv() {
  const rows = ['tSec,band,strength', ...taps.map(t => `${t.tSec},${t.band},${t.strength}`)];
  return rows.join('\n');
}

function fromCsv(text) {
  const lines = text.trim().split(/\r?\n/).filter(Boolean);
  const result = [];
  for (const line of lines) {
    if (/^tSec/i.test(line)) continue; // skip header
    const [tSec, band, strength] = line.split(',').map(s => s.trim());
    const t = parseFloat(tSec);
    const b = parseInt(band ?? '0', 10);
    const s = parseFloat(strength ?? '1.0');
    if (isNaN(t)) continue;
    result.push({ tSec: t, band: isNaN(b) ? 0 : b, strength: isNaN(s) ? 1.0 : s });
  }
  return result.sort((a, b) => a.tSec - b.tSec);
}

// ---------------------------------------------------------------------------
// Export / Import
// ---------------------------------------------------------------------------
btnExport.addEventListener('click', () => {
  const csv = toCsv();
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'crunchtime-beats.csv';
  a.click();
  URL.revokeObjectURL(url);
});

btnCopy.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(toCsv());
    const orig = btnCopy.textContent;
    btnCopy.textContent = STRINGS[lang].btnCopied;
    setTimeout(() => { btnCopy.textContent = STRINGS[lang].btnCopy; }, 1200);
  } catch (_) {
    importTA.value = toCsv();
    importTA.select();
  }
});

btnImport.addEventListener('click', () => {
  const parsed = fromCsv(importTA.value);
  if (parsed.length === 0) {
    importStatus.textContent = lang === 'zh' ? '未找到有效行' : 'no valid rows found';
    importStatus.style.color = 'var(--warn)';
    return;
  }
  taps = parsed;
  renderTaps();
  importStatus.textContent = lang === 'zh' ? `✓ 已导入 ${parsed.length} 个点击` : `✓ imported ${parsed.length} taps`;
  importStatus.style.color = 'var(--ok)';
});

// ---------------------------------------------------------------------------
// i18n
// ---------------------------------------------------------------------------
let lang = 'en';

const STRINGS = {
  en: {
    h1:            'TAP RECORDER',

function applyLang(l) {
  const s = STRINGS[l];
  document.querySelector('h1').textContent = s.h1;
  document.querySelector('h2').textContent = s.h2;
  document.getElementById('link-back').textContent = s.linkBack;
  document.getElementById('btn-lang').textContent = s.btnLang;
  document.querySelector('.file-drop .label').textContent = s.dropLabel;
  document.querySelector('.file-drop .sub').textContent = s.dropSub;
  btnPlay.textContent = isPlaying ? s.btnPause : s.btnPlay;
  btnStop.textContent = s.btnStop;
  document.getElementById('tap-hint').textContent = s.tapHint;
  document.querySelector('.section-label').textContent = s.sectionTaps + ' — ';
  document.querySelector('.section-label').appendChild(
    Object.assign(document.createElement('span'), { id: 'tap-count', textContent: String(taps.length) })
  );
  document.getElementById('empty-msg').textContent = s.emptyMsg;
  const ths = document.querySelectorAll('#tap-list th');
  if (ths[2]) ths[2].textContent = s.thBand;
  if (ths[3]) ths[3].textContent = s.thStrength;
  btnUndo.textContent   = s.btnUndo;
  btnExport.textContent = s.btnExport;
  btnCopy.textContent   = s.btnCopy;
  btnClear.textContent  = s.btnClear;
  document.querySelector('#import-wrap .section-label').textContent = s.sectionImport;
  importTA.placeholder  = s.importPH;
  document.getElementById('btn-import').textContent = s.btnImport;
}

document.getElementById('btn-lang').addEventListener('click', () => {
  lang = lang === 'en' ? 'zh' : 'en';
  applyLang(lang);
  document.getElementById('btn-lang').blur();
});

// Patch syncTransport to use translated play/pause label
const _origSyncTransport = syncTransport;
function syncTransport() {
  _origSyncTransport();
  const s = STRINGS[lang];
  btnPlay.textContent = isPlaying ? s.btnPause : s.btnPlay;
}
